# version: '3.8'

networks:
  monitoring:
    driver: bridge
    name: monitoring
    
volumes:
  prometheus_data:
    name: prometheus_data
  grafana-data:
    name: grafana-data
  loki-data:
    name: loki-data
  tempo-data:
    name: tempo-data
  otel-data:
    name: otel-data
  postgres-data:
    name: postgres-data
  ollama-data:
    name: ollama-data
  open-webui-data:
    name: open-webui-data
  n8n-data:
    name: n8n-data
  qdrant-data:
    name: qdrant-data
    
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'  # retention time
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'   
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_BASIC_ENABLED: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.processes'
    ports:
      - "9100:9100"
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports: 
      - "9093:9093"
    command:
      - --config.file=/etc/alertmanager/alert-config.yaml
    volumes:
      - ./alert-config.yaml:/etc/alertmanager/alert-config.yaml 
      - ./alert-email-template.tmpl:/etc/alertmanager/email-template.tmpl:ro
    networks:
      - monitoring  

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: unless-stopped
    user: "0"
    ports:
      - "3200:3200"     # Tempo HTTP API
      - "4317"  # otlp grpc
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - tempo-data:/tmp/tempo
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - monitoring

            
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    user: "0"
    ports:
      - "3100:3100"  # Loki HTTP port
    volumes:
      - ./loki-config.yaml:/etc/loki/loki-config.yaml
      - loki-data:/data/loki
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - monitoring
      
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    command:
      - "--config=/etc/otelcol-contrib/config.yaml"
    environment:
      - OTELCOL_LOG_LEVEL=debug    # <- We set the log level here
    ports:
      - 1888:1888 # pprof extension
      - 8890:8890 # Prometheus metrics exposed by the Collector
      - 8889:8889 # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver
      - 55679:55679 # zpages extension
    networks:
      - monitoring

  # ── Application ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - monitoring

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://user:password@postgres:5432/appdb?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - monitoring

  api:
    build: ./app/api
    container_name: api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/appdb
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - otel-collector
    networks:
      - monitoring

  worker:
    build: ./app/worker
    container_name: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/appdb
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: worker
      POLL_INTERVAL: "5"
      METRICS_PORT: "9091"
    ports:
      - "9091:9091"
    depends_on:
      - postgres
      - otel-collector
    networks:
      - monitoring

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - monitoring

  # ── AI Stack ──────────────────────────────────────────────────────────────

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - monitoring

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - monitoring

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY: observability-secret-key
      OPENAI_API_BASE_URL: http://ai-agent:8001/v1
      OPENAI_API_KEY: "observability-key"
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama
      - ai-agent
    networks:
      - monitoring

  ai-agent:
    build: ./app/ai-agent
    container_name: ai-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/appdb
      OLLAMA_URL: http://ollama:11434
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100
      ALERTMANAGER_URL: http://alertmanager:9093
      ANALYSIS_INTERVAL_MINUTES: "15"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - ollama
      - prometheus
      - loki
      - alertmanager
      - qdrant
    networks:
      - monitoring

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      WEBHOOK_URL: http://n8n:5678/
      N8N_HOST: "0.0.0.0"
      GENERIC_TIMEZONE: Europe/Paris
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - monitoring
