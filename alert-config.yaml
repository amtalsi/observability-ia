global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: 'ai-agent'

receivers:
  - name: 'null'
  - name: 'ai-agent'
    webhook_configs:
      - url: 'http://ai-agent:8001/webhook/alert'
        send_resolved: false

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname']
