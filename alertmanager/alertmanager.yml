global:
  resolve_timeout: 5m
  # Slack and email can be configured here when ready
  # smtp_smarthost: 'localhost:587'

route:
  group_by: ["alertname", "category", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: n8n-webhook

  routes:
    # Critical alerts → immediate notification, shorter repeat
    - match:
        severity: critical
      receiver: n8n-webhook
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → standard routing
    - match:
        severity: warning
      receiver: n8n-webhook
      repeat_interval: 4h

receivers:
  # Primary receiver: N8N workflow for AI analysis
  - name: n8n-webhook
    webhook_configs:
      - url: "http://n8n:5678/webhook/alertmanager"
        send_resolved: true
        http_config:
          basic_auth:
            username: admin
            password: changeme
        max_alerts: 10

inhibit_rules:
  # Critical alert suppresses warning for the same resource
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]
