# ============================================================
# Observability-IA — Full stack: metrics + logs + traces + AI
# ============================================================
# Services
#  - prometheus      : metrics collection & alerting
#  - alertmanager    : alert routing (→ N8N webhook)
#  - node-exporter   : host metrics
#  - cadvisor        : container metrics
#  - loki            : log aggregation
#  - promtail        : log shipping from Docker
#  - tempo           : distributed tracing backend
#  - grafana         : dashboards + annotations
#  - ollama          : local LLM (AI analysis engine)
#  - open-webui      : chat UI for Ollama
#  - n8n             : workflow automation (alert→AI→annotation)
# ============================================================

networks:
  observability:
    driver: bridge

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  tempo_data:
  grafana_data:
  ollama_data:
  n8n_data:

services:

  # ----------------------------------------------------------
  # PROMETHEUS — metrics scraping & evaluation
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability

  # ----------------------------------------------------------
  # ALERTMANAGER — route alerts to N8N webhook
  # ----------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - observability

  # ----------------------------------------------------------
  # NODE EXPORTER — host / OS metrics
  # ----------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - observability

  # ----------------------------------------------------------
  # CADVISOR — container resource metrics
  # ----------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - observability

  # ----------------------------------------------------------
  # LOKI — log aggregation backend
  # ----------------------------------------------------------
  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability

  # ----------------------------------------------------------
  # PROMTAIL — ship Docker container logs to Loki
  # ----------------------------------------------------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability
    depends_on:
      - loki

  # ----------------------------------------------------------
  # TEMPO — distributed tracing backend
  # ----------------------------------------------------------
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - observability

  # ----------------------------------------------------------
  # GRAFANA — dashboards, alerting & annotation feed
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - tempo

  # ----------------------------------------------------------
  # OLLAMA — local LLM server (AI analysis engine)
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - observability
    # GPU support (uncomment if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ----------------------------------------------------------
  # OLLAMA INIT — pull the configured model once on startup
  # ----------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    restart: on-failure
    entrypoint: ["/bin/sh", "/scripts/init-ollama.sh"]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - ./scripts/init-ollama.sh:/scripts/init-ollama.sh:ro
      - ollama_data:/root/.ollama
    networks:
      - observability
    depends_on:
      - ollama

  # ----------------------------------------------------------
  # OPEN WEBUI — browser-based chat UI for Ollama
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_AUTH: "false"
    ports:
      - "${OPEN_WEBUI_PORT:-8501}:8080"
    networks:
      - observability
    depends_on:
      - ollama

  # ----------------------------------------------------------
  # N8N — workflow automation: alerts → AI → annotations
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:1.44.1
    container_name: n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_LOG_LEVEL: info
      N8N_ENCRYPTION_KEY: "observability-ia-key-change-in-production"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336
      # Environment variables passed into workflow expressions
      GRAFANA_HOST: ${GRAFANA_HOST:-http://grafana:3000}
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      PROMETHEUS_HOST: ${PROMETHEUS_HOST:-http://prometheus:9090}
      LOKI_HOST: ${LOKI_HOST:-http://loki:3100}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    ports:
      - "5678:5678"
    networks:
      - observability
    depends_on:
      - grafana
      - ollama
      - prometheus
      - loki
