server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Découverte automatique des containers Docker
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          # Seuls les containers avec un label compose service
          - name: label
            values: ["com.docker.compose.project"]

    relabel_configs:
      # Nom du service compose (api, worker, postgres, …)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # Nom du container
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # Image utilisée
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project

    pipeline_stages:
      # Parse le JSON émis par l'API et le Worker
      - json:
          expressions:
            level: levelname
            logger: name
            message: message
      - labels:
          level:
          logger:
      - output:
          source: message
