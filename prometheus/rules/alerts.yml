groups:

  # ─── Infrastructure Alerts ────────────────────────────────
  - name: infrastructure
    rules:

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 80%) for 5 minutes."

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 95%) for 2 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.1f\" $value }}% (threshold: 85%) for 5 minutes."

      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.1f\" $value }}% (threshold: 95%)."

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk available: {{ printf \"%.1f\" $value }}% (threshold: 15%)."

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk available: {{ printf \"%.1f\" $value }}% (threshold: 5%)."

  # ─── Container Alerts ─────────────────────────────────────
  - name: containers
    rules:

      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name!=""}[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} high CPU"
          description: "Container {{ $labels.name }} CPU: {{ printf \"%.1f\" $value }}%."

      - alert: ContainerHighMemory
        expr: (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) * 100 > 90
        for: 5m
        labels:
          severity: warning
          category: container
        annotations:
          summary: "Container {{ $labels.name }} high memory"
          description: "Container {{ $labels.name }} memory: {{ printf \"%.1f\" $value }}% of limit."

      - alert: ContainerDown
        expr: absent(container_last_seen{name!=""})
        for: 1m
        labels:
          severity: critical
          category: container
        annotations:
          summary: "Container appears down"
          description: "No container_last_seen metric received for 1 minute."

  # ─── Service Health Alerts ────────────────────────────────
  - name: services
    rules:

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          category: service
        annotations:
          summary: "Target down: {{ $labels.job }} ({{ $labels.instance }})"
          description: "Prometheus target {{ $labels.job }}/{{ $labels.instance }} has been down for 2 minutes."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 1m
        labels:
          severity: critical
          category: service
        annotations:
          summary: "Grafana is unreachable"
          description: "Grafana has been unreachable for 1 minute."

      - alert: OllamaDown
        expr: up{job="ollama"} == 0
        for: 2m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Ollama AI service is unreachable"
          description: "Ollama LLM service has been unreachable for 2 minutes. AI analysis will be degraded."

      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 2m
        labels:
          severity: critical
          category: service
        annotations:
          summary: "Loki log aggregation is down"
          description: "Loki has been unreachable for 2 minutes. Logs are not being collected."

  # ─── Alertmanager Self-Health ─────────────────────────────
  - name: alertmanager
    rules:

      - alert: AlertmanagerConfigReloadFailed
        expr: alertmanager_config_last_reload_successful == 0
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Alertmanager config reload failed"
          description: "Alertmanager failed to reload its configuration."

      - alert: AlertmanagerNotificationsFailed
        expr: rate(alertmanager_notifications_failed_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          category: service
        annotations:
          summary: "Alertmanager notifications failing"
          description: "Alertmanager is failing to send notifications at {{ $value | humanize }} per second."
