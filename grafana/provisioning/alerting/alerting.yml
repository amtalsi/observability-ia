apiVersion: 1

# Contact points — N8N webhook receives alerts for AI analysis
contactPoints:
  - orgId: 1
    name: n8n-ai-analysis
    receivers:
      - uid: n8n-webhook-receiver
        type: webhook
        settings:
          url: "http://n8n:5678/webhook/grafana-alerts"
          httpMethod: POST
          username: admin
          password: changeme
        disableResolveMessage: false

# Notification policies
policies:
  - orgId: 1
    receiver: n8n-ai-analysis
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
