apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: observability-postgres
    type: postgres
    url: postgres:5432
    user: user
    secureJsonData:
      password: password
    jsonData:
      database: appdb
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: false
    editable: true
